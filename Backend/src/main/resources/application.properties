spring.application.name=Backend
server.port=8080

# Frontend URL used in verification links
app.frontend.base-url=http://localhost:3000
app.admin.email=admin@gmail.com
app.mail.from=${SMTP_FROM:}
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

# Google SMTP (set by environment variables)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
